version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: efd_reinf_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./public/uploads:/var/www/html/public/uploads
    networks:
      - efd_network
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=efd_reinf
      - DB_USER=reinf_user
      - DB_PASS=reinf_pass123
      - APP_ENV=production
      - APP_URL=http://localhost

  FROM php:8.2-fpm

    RUN apt-get update && apt-get install -y \
        git curl unzip \
        libpng-dev libonig-dev libxml2-dev \
        libzip-dev libssl-dev libcurl4-openssl-dev \
        && docker-php-ext-install \
            pdo_mysql mbstring exif pcntl bcmath \
            gd zip soap dom curl openssl \
        && apt-get clean && rm -rf /var/lib/apt/lists/*

    COPY --from=composer:latest /usr/bin/composer /usr/bin/composer

    WORKDIR /var/www
    RUN chown -R www-data:www-data /var/www

    EXPOSE 9000
    CMD ["php-fpm"]    

  db:
    image: mysql:8.0
    container_name: efd_reinf_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass123
      MYSQL_DATABASE: efd_reinf
      MYSQL_USER: reinf_user
      MYSQL_PASSWORD: reinf_pass123
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - efd_network

  nginx:
    image: nginx:alpine
    container_name: efd_reinf_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - efd_network
    depends_on:
      - app

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: efd_reinf_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: reinf_user
      PMA_PASSWORD: reinf_pass123
    ports:
      - "8080:80"
    networks:
      - efd_network
    depends_on:
      - db

volumes:
  db_data:

networks:
  efd_network:
    driver: bridge
