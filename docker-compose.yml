services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: efd_reinf_app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - .:/var/www/html
      - ./public/uploads:/var/www/html/public/uploads
      - ./storage:/var/www/html/storage
    networks:
      - efd_network
    depends_on:
      - db
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-${DB_NAME:-efd_reinf}}
      - DB_USERNAME=${DB_USERNAME:-${DB_USER:-reinf_user}}
      - DB_PASSWORD=${DB_PASSWORD:-${DB_PASS:-reinf_pass123}}
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_KEY=${APP_KEY:-}
      - APP_SECRET=${APP_SECRET:-}
      - REINF_TP_AMB=${REINF_TP_AMB:-2}
      - ALLOW_SIMULATED_TRANSMISSION=${ALLOW_SIMULATED_TRANSMISSION:-0}

  db:
    image: mysql:8.0
    container_name: efd_reinf_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass123}
      MYSQL_DATABASE: ${DB_DATABASE:-${DB_NAME:-efd_reinf}}
      MYSQL_USER: ${DB_USERNAME:-${DB_USER:-reinf_user}}
      MYSQL_PASSWORD: ${DB_PASSWORD:-${DB_PASS:-reinf_pass123}}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Apenas localhost — não exponha 3306 na internet
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - efd_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_pass123}"]
      interval: 5s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:alpine
    container_name: efd_reinf_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - efd_network
    depends_on:
      - app

  # Só sobe com: docker compose --profile tools up -d
  # e fica restrito a localhost
  phpmyadmin:
    profiles: ["tools"]
    image: phpmyadmin/phpmyadmin
    container_name: efd_reinf_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-reinf_user}
      PMA_PASSWORD: ${DB_PASS:-reinf_pass123}
      UPLOAD_LIMIT: 100M
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - efd_network
    depends_on:
      - db

volumes:
  db_data:

networks:
  efd_network:
    driver: bridge
